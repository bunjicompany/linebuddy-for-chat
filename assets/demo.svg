<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">いつもの改行 for Chat の動作イメージ</title>
  <desc id="desc">チャット入力欄でEnterキーを押しても送信せず、入力欄内で改行されることを示す説明画像。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M2 2 L12 7 L2 12 Z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#f7f5fb"/>
  <rect x="60" y="50" width="1080" height="575" rx="22" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="60" y="50" width="1080" height="64" rx="22" fill="#312e81"/>
  <path d="M60 92 H1140 V114 H60 Z" fill="#312e81"/>
  <text x="96" y="90" fill="#ffffff" font-size="23" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">いつもの改行 for Chat</text>
  <text x="1090" y="90" text-anchor="end" fill="#c4b5fd" font-size="16" font-family="Meiryo, Yu Gothic, Arial, sans-serif">ChatGPT / Slack / Teams / Discord など</text>

  <rect x="110" y="150" width="670" height="390" rx="18" fill="#f8fafc" stroke="#d1d5db"/>
  <rect x="110" y="150" width="670" height="54" rx="18" fill="#eef2ff"/>
  <path d="M110 186 H780 V204 H110 Z" fill="#eef2ff"/>
  <circle cx="148" cy="177" r="14" fill="#7c3aed"/>
  <text x="176" y="183" fill="#3730a3" font-size="18" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">チャット入力欄</text>

  <rect x="152" y="236" width="444" height="62" rx="18" fill="#e0f2fe"/>
  <text x="178" y="273" fill="#075985" font-size="18" font-family="Meiryo, Yu Gothic, Arial, sans-serif">今日の打ち合わせ内容をまとめて</text>
  <rect x="288" y="320" width="446" height="62" rx="18" fill="#ede9fe"/>
  <text x="314" y="357" fill="#4c1d95" font-size="18" font-family="Meiryo, Yu Gothic, Arial, sans-serif">もちろんです。要点を整理します。</text>

  <rect x="150" y="430" width="590" height="78" rx="24" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="180" y="462" fill="#111827" font-size="20" font-family="Meiryo, Yu Gothic, Arial, sans-serif">1行目を書いて</text>
  <text x="180" y="492" fill="#111827" font-size="20" font-family="Meiryo, Yu Gothic, Arial, sans-serif">2行目へ改行</text>
  <rect x="654" y="447" width="58" height="42" rx="21" fill="#a78bfa"/>
  <text x="683" y="475" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" font-family="Arial, sans-serif">↵</text>

  <rect x="835" y="154" width="250" height="86" rx="18" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="960" y="190" text-anchor="middle" fill="#4c1d95" font-size="21" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">Enter</text>
  <text x="960" y="219" text-anchor="middle" fill="#5b21b6" font-size="16" font-family="Meiryo, Yu Gothic, Arial, sans-serif">送信ではなく改行</text>
  <path d="M946 258 C902 337 812 405 721 451" fill="none" stroke="#7c3aed" stroke-width="6" marker-end="url(#arrow)"/>

  <rect x="824" y="360" width="286" height="140" rx="22" fill="#ecfdf5" stroke="#86efac"/>
  <text x="967" y="400" text-anchor="middle" fill="#14532d" font-size="22" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">送信キーは変えません</text>
  <text x="967" y="434" text-anchor="middle" fill="#166534" font-size="17" font-family="Meiryo, Yu Gothic, Arial, sans-serif">入力欄内の改行だけを変換</text>
  <text x="967" y="465" text-anchor="middle" fill="#166534" font-size="17" font-family="Meiryo, Yu Gothic, Arial, sans-serif">文章・パスワードは保存しません</text>

  <rect x="120" y="575" width="960" height="32" rx="16" fill="#fef3c7"/>
  <text x="600" y="598" text-anchor="middle" fill="#92400e" font-size="17" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">生成AI・SNS・チャットで、Enterを「送信」ではなく「入力欄内改行」にできます</text>
</svg>
